name: build-containers

on:
  workflow_dispatch:
  push:
    branches:
      - main

# ==================================================

env:

  # Global Variables
  UPSTREAM_URL: https://github.com/mygod/slipstream-rust.git
  UPSTREAM_BRANCH: main

jobs:
  env:
    outputs:

      # Global Variables
      CONTAINER_NAME_SANS_ROLE: slipstream-rust
      CONTAINER_ROLES: '[ "client", "server" ]'

    runs-on: ubuntu-latest
    steps:
      - run:

# ==================================================

  prepare:

    needs: env

    outputs:
      UPSTREAM_COMMIT_DIGEST: ${{ steps.prepare.outputs.UPSTREAM_COMMIT_DIGEST }}
      CONTAINER_VERSION: ${{ steps.prepare.outputs.CONTAINER_VERSION }}
      ALREADY_BUILT: ${{ steps.prepare.outputs.ALREADY_BUILT }}

    runs-on: ubuntu-latest

    steps:
      - name: Prepare
        id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu -o pipefail

          mkdir /tmp/repo
          pushd /tmp/repo >/dev/null

          git config --global init.defaultBranch main # This suppresses a warning.
          git init
          git remote add origin "$UPSTREAM_URL"
          git fetch --no-tags --filter=blob:none origin "$UPSTREAM_BRANCH"

          commit_count=$(git rev-list --count "origin/$UPSTREAM_BRANCH")
          latest_commit_digest=$(git rev-parse "origin/$UPSTREAM_BRANCH")
          echo "UPSTREAM_COMMIT_DIGEST=${latest_commit_digest:?}" >> "$GITHUB_OUTPUT"

          popd >/dev/null

          container_version=commit${commit_count:?}-${latest_commit_digest::10}
          echo "CONTAINER_VERSION=${container_version:?}" >> "$GITHUB_OUTPUT"

          user='${{ github.repository_owner }}'
          container_role='${{ fromJson(needs.env.outputs.CONTAINER_ROLES)[0] }}'
          container_name_sans_role='${{ needs.env.outputs.CONTAINER_NAME_SANS_ROLE }}'
          container_name=${container_name_sans_role:?}-${container_role:?}

          echo "containers to build: ${container_name_sans_role:?}-*:${container_version:?}"

          if
            gh api \
              --header='Accept: application/vnd.github+json' \
              --header='X-GitHub-Api-Version: 2022-11-28' \
              "/users/${user:?}/packages/container/${container_name:?}/versions" \
            | jq \
              --exit-status \
              --arg version "$container_version" \
              '.[].metadata.container.tags[] | select (. == $version)'
          then
            echo "ALREADY_BUILT=true" >> "$GITHUB_OUTPUT"
            echo "containers already exist. skipping workflow."
          else
            echo "ALREADY_BUILT=false" >> "$GITHUB_OUTPUT"
          fi

# ==================================================

  build:

    needs:
      - env
      - prepare

    if: needs.prepare.outputs.ALREADY_BUILT != 'true'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch:
          - amd64
          - arm64
        container-role: ${{ fromJson(needs.env.outputs.CONTAINER_ROLES) }}

    runs-on: ${{
        matrix.arch == 'amd64' && 'ubuntu-latest' ||
        matrix.arch == 'arm64' && 'ubuntu-24.04-arm' ||
        'invalid-arch'
      }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container
        run: |
          set -eu

          arch='${{ matrix.arch }}'
          user='${{ github.repository_owner }}'
          container_name_sans_role='${{ needs.env.outputs.CONTAINER_NAME_SANS_ROLE }}'
          container_role='${{ matrix.container-role }}'
          container_address=ghcr.io/${user:?}/${container_name_sans_role:?}-${container_role:?}
          commit_digest='${{ needs.prepare.outputs.UPSTREAM_COMMIT_DIGEST }}'

          mkdir /tmp/docker
          cp Dockerfile /tmp/docker
          cd /tmp/docker

          git config --global advice.detachedHead false # This suppresses a warning.
          git clone --no-checkout "${UPSTREAM_URL:?}" src
          git -C src checkout "${commit_digest:?}"
          git -C src submodule update --init --recursive

          docker buildx build \
            --tag="${container_address:?}" \
            --metadata-file=/tmp/metadata.json \
            --build-arg=CLIENT_OR_SERVER="${container_role:?}" \
            --output=type=image,push=true,push-by-digest=true \
            .

          jq --raw-output '."containerimage.digest"' /tmp/metadata.json \
            > "/tmp/container-digest-${container_role:?}-${arch:?}.txt"

      - name: Save the container digest as an artifact
        uses: actions/upload-artifact@v6
        with:
          path: /tmp/container-digest-${{ matrix.container-role }}-${{ matrix.arch }}.txt
          name: container-digest-${{ matrix.container-role }}-${{ matrix.arch }}.txt

# ==================================================

  combine-and-push:

    needs:
      - env
      - prepare
      - build

    permissions:
      packages: write

    strategy:
      matrix:
        container-role: ${{ fromJson(needs.env.outputs.CONTAINER_ROLES) }}

    runs-on: ubuntu-latest

    steps:

      - name: Get the container digests
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          pattern: container-digest-${{ matrix.container-role }}-*
          path: /tmp/digests/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine and push containers into a multi-arch image
        run: |
          set -eu

          user='${{ github.repository_owner }}'
          container_name_sans_role='${{ needs.env.outputs.CONTAINER_NAME_SANS_ROLE }}'
          container_role='${{ matrix.container-role }}'
          container_address=ghcr.io/${user:?}/${container_name_sans_role:?}-${container_role:?}
          container_version='${{ needs.prepare.outputs.CONTAINER_VERSION }}'

          srcs=()
          for file in /tmp/digests/*.txt; do
            container_digest=$(cat "$file")
            srcs+=("${container_address:?}@${container_digest:?}")
          done

          docker buildx imagetools create \
            --tag="${container_address:?}:latest" \
            --tag="${container_address:?}:${container_version:?}" \
            "${srcs[@]}"
