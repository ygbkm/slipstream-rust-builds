name: build-sip003

on:
  workflow_dispatch:

env:
  UPSTREAM_URL: https://github.com/Mygod/slipstream-plugin-android
  UPSTREAM_BRANCH: master
  OPENSSL_URL: https://github.com/openssl/openssl/releases/download/openssl-3.6.0/openssl-3.6.0.tar.gz

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Build APK
        run: |

          rustup target add \
            armv7-linux-androideabi \
            aarch64-linux-android

          mkdir src
          cd src

          git clone "${UPSTREAM_URL:?}" .
          git submodule update --init --recursive

          curl -fsSL "${OPENSSL_URL:?}" -o openssl.tar.gz
          mkdir openssl
          tar --extract --gzip --strip-components=1 --file=openssl.tar.gz --directory=openssl
          export OPENSSL_ROOT_DIR=$(pwd)/openssl
          export OPENSSL_INCLUDE_DIR=$(pwd)/openssl/include

          ndk_version=$(basename "${ANDROID_NDK_HOME:?}")
          sed -Ei 's|(^\s*ndkVersion\s*=\s*)"[^"]+"|\1"'"$ndk_version"'"|' app/build.gradle.kts

          chmod 755 gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v7
        with:
          name: slipdroid-apk
          path: src/app/build/outputs/**/*.apk
